@let isDisabled = isDisabledSignal();

<p-button
  label="signEIP712TypedData"
  [disabled]="isDisabled"
  styleClass="w-64"
  (onClick)="onClickOpenDialogButton()"
/>

<p-dialog
  [modal]="true"
  [(visible)]="isDialogVisibleSignal"
  styleClass="max-h-4/5 w-4/5 max-w-96 overflow-y-auto"
>
  <ng-template pTemplate="headless">
    <form [formRoot]="form">
      <div class="flex flex-col gap-8 p-8">
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="typed-data">Typed data</label>
            <input id="typed-data" type="text" pInputText [formField]="form.typedData" />
            <app-form-field-errors [state]="form.typedData()" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="ticket-token">Ticket token</label>
            <input id="ticket-token" type="text" pInputText [formField]="form.ticketToken" />
            <app-form-field-errors [state]="form.ticketToken()" />
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <p-button label="Cancel" severity="secondary" (onClick)="onClickCancelButton()" />
          <p-button type="submit" label="Submit" />
        </div>
      </div>
    </form>
  </ng-template>
</p-dialog>
