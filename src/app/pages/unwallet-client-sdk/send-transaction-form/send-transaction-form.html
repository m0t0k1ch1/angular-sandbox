@let isDisabled = isDisabledSignal();

<p-button
  label="sendTransaction"
  [disabled]="isDisabled"
  styleClass="w-64"
  (onClick)="onClickOpenDialogButton()"
/>

<p-dialog
  [modal]="true"
  [(visible)]="isDialogVisibleSignal"
  styleClass="max-h-4/5 w-4/5 max-w-96 overflow-y-auto"
>
  <ng-template pTemplate="headless">
    <form [formRoot]="form">
      <div class="flex flex-col gap-8 p-8">
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="chain-id">Chain ID</label>
            <input id="chain-id" type="text" pInputText [formField]="form.chainID" />
            <app-form-field-errors [state]="form.chainID()" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="to-address">To address</label>
            <input id="to-address" type="text" pInputText [formField]="form.toAddress" />
            <app-form-field-errors [state]="form.toAddress()" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="value">Value</label>
            <input id="value" type="text" pInputText [formField]="form.value" />
            <app-form-field-errors [state]="form.value()" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="data">Data</label>
            <input id="data" type="text" pInputText [formField]="form.data" />
            <app-form-field-errors [state]="form.data()" />
          </div>
          <div class="flex flex-col gap-1">
            <label for="ticket-token">Ticket token</label>
            <input id="ticket-token" type="text" pInputText [formField]="form.ticketToken" />
            <app-form-field-errors [state]="form.ticketToken()" />
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <p-button label="Cancel" severity="secondary" (onClick)="onClickCancelButton()" />
          <p-button type="submit" label="Submit" />
        </div>
      </div>
    </form>
  </ng-template>
</p-dialog>
