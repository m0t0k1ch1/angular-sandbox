@let isDisabled = isDisabledSignal();

<p-button
  label="sendTransaction"
  [disabled]="isDisabled"
  styleClass="w-64"
  (onClick)="onClickOpenDialogButton()"
/>

<p-dialog
  [modal]="true"
  [(visible)]="isDialogVisibleSignal"
  styleClass="max-h-4/5 w-4/5 max-w-96 overflow-y-auto"
>
  <ng-template pTemplate="headless">
    <form [formGroup]="form" (submit)="onSubmit()">
      <div class="flex flex-col gap-8 p-8">
        <div class="flex flex-col gap-4">
          <div class="flex flex-col gap-1">
            <label for="chain-id">Chain ID</label>
            <input
              id="chain-id"
              type="text"
              pInputText
              formControlName="chainID"
              [invalid]="shouldShowFormError('chainID')"
            />
            <span class="form-error">{{ getFormErrorMessage('chainID') }}</span>
          </div>
          <div class="flex flex-col gap-1">
            <label for="to-address">To address</label>
            <input
              id="to-address"
              type="text"
              pInputText
              formControlName="toAddress"
              [invalid]="shouldShowFormError('toAddress')"
            />
            <span class="form-error">{{ getFormErrorMessage('toAddress') }}</span>
          </div>
          <div class="flex flex-col gap-1">
            <label for="value">Value</label>
            <input
              id="value"
              type="text"
              pInputText
              formControlName="value"
              [invalid]="shouldShowFormError('value')"
            />
            <span class="form-error">{{ getFormErrorMessage('value') }}</span>
          </div>
          <div class="flex flex-col gap-1">
            <label for="data">Data</label>
            <input
              id="data"
              type="text"
              pInputText
              formControlName="data"
              [invalid]="shouldShowFormError('data')"
            />
            <span class="form-error">{{ getFormErrorMessage('data') }}</span>
          </div>
          <div class="flex flex-col gap-1">
            <label for="ticket-token">Ticket token</label>
            <input
              id="ticket-token"
              type="text"
              pInputText
              formControlName="ticketToken"
              [invalid]="shouldShowFormError('ticketToken')"
            />
            <span class="form-error">{{ getFormErrorMessage('ticketToken') }}</span>
          </div>
        </div>
        <div class="flex justify-end gap-2">
          <p-button label="Cancel" severity="secondary" (onClick)="onClickCancelButton()" />
          <p-button type="submit" label="Submit" />
        </div>
      </div>
    </form>
  </ng-template>
</p-dialog>
